function setState(patch) {

// ── Drag Manager (mouse-based, no HTML5 drag API) ───────────────────────────
const DragMgr = (() => {
  let active = false;
  let libItem = null;
  let rackItemId = null;
  let ghost = null;
  let targetSlot = null;

  function getUnits() {
    if (libItem) return libItem.units;
    const it = state.rack?.items?.find(i => i.id === rackItemId);
    return it ? it.units : 1;
  }

  function updateHighlight() {
    const hl = document.getElementById('rack-slot-highlight');
    if (!hl) return;
    if (!targetSlot) { hl.style.display = 'none'; return; }
    const units = getUnits();
    const maxSlot = (state.rack?.totalU || 1) - units + 1;
    if (targetSlot < 1 || targetSlot > maxSlot) { hl.style.display = 'none'; return; }
    hl.style.display = 'block';
    hl.style.top = ((targetSlot - 1) * U) + 'px';
    hl.style.height = (units * U) + 'px';
    const lbl = hl.querySelector('.hl-label');
    if (lbl) lbl.textContent = units > 1
      ? `Slot ${targetSlot}–${targetSlot + units - 1}`
      : `Slot ${targetSlot}`;
  }

  function onMove(e) {
    if (!ghost) return;
    ghost.style.left = e.clientX + 'px';
    ghost.style.top  = e.clientY + 'px';

    const bay = document.getElementById('rack-bay');
    if (!bay) { targetSlot = null; updateHighlight(); return; }
    const r = bay.getBoundingClientRect();
    if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) {
      targetSlot = null; updateHighlight(); return;
    }
    const newSlot = Math.max(1, Math.floor((e.clientY - r.top) / U) + 1);
    if (newSlot !== targetSlot) { targetSlot = newSlot; updateHighlight(); }
  }

  function onUp() {
    if (targetSlot) {
      if (rackItemId) moveRackItem(rackItemId, targetSlot);
      else if (libItem) addItem(libItem, targetSlot);
    }
    cleanup();
  }

  function cleanup() {
    active = false;
    libItem = null;
    rackItemId = null;
    targetSlot = null;
    if (ghost) { ghost.remove(); ghost = null; }
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    // Clear drag state without re-render loop
    state.rackDragId = null;
    state.dragItem = null;
    const hl = document.getElementById('rack-slot-highlight');
    if (hl) hl.style.display = 'none';
    render();
  }

  return {
    get active() { return active; },
    get rackItemId() { return rackItemId; },

    start(lib, rackId, e) {
      if (active) cleanup(); // safety: end any previous drag
      active = true;
      libItem = lib;
      rackItemId = rackId;
      targetSlot = null;

      // Ghost label that follows cursor
      ghost = document.createElement('div');
      ghost.style.cssText =
        'position:fixed;z-index:9999;pointer-events:none;' +
        'background:#1c2333;border:1.5px solid #2f81f7;border-radius:6px;' +
        'padding:4px 12px;font-size:11px;font-weight:600;color:#79c0ff;' +
        'white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.6);' +
        'transform:translate(-50%,-120%);font-family:system-ui,sans-serif;';
      const name = lib ? lib.name : (state.rack?.items?.find(i=>i.id===rackId)?.name || '');
      const units = getUnits();
      ghost.textContent = `⬛ ${name}  (${units}U)`;
      document.body.appendChild(ghost);

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.body.style.userSelect = 'none';
      document.body.style.cursor = 'grabbing';

      // Update state so dragging item fades in rack
      state.rackDragId = rackId;
      state.dragItem = lib;
      // Don't call full render() here — just update opacity of the item directly
      const existing = document.querySelector(`[data-rackid="${rackId}"]`);
      if (existing) existing.style.opacity = '0.3';

      onMove(e); // position ghost immediately
    },
  };
})();

// ── Logic ─────────────────────────────────────────────────────────────────────
function getOcc(items) {
  const s = new Set();
  items.forEach(x => { for (let u = x.slot; u < x.slot + x.units; u++) s.add(u); });
  return s;
}

function findSlot(items, units, totalU) {
  const occ = getOcc(items);
  for (let s = 1; s <= totalU - units + 1; s++) {
    let ok = true;
    for (let u = s; u < s + units; u++) if (occ.has(u)) { ok = false; break; }
    if (ok) return s;
  }
  return null;
}

function addItem(lib, slotOvr) {
  const rack = state.rack;
  const slot = slotOvr || findSlot(rack.items, lib.units, rack.totalU);
  if (!slot) return;
  const occ = getOcc(rack.items);
  for (let u = slot; u < slot + lib.units; u++) if (occ.has(u)) return;
  const portObjects = lib.ports > 0
    ? Array.from({ length: lib.ports }, (_, i) => ({ id: genId(), number: i + 1, label: '' }))
    : [];
  const ni = { ...lib, id: genId(), slot, customName: '', portObjects };
  setState(s => ({ rack: { ...s.rack, items: [...s.rack.items, ni] }, selectedId: ni.id }));
  // Auto-fetch image immediately
  fetchDeviceImage(ni);
}

function removeItem(id) {
  const it = state.rack.items.find(i => i.id === id);
  const pids = new Set(it?.portObjects?.map(p => p.id) || []);
  setState(s => ({
    rack: { ...s.rack, items: s.rack.items.filter(i => i.id !== id) },
    cables: s.cables.filter(c => !pids.has(c.fromPortId) && !pids.has(c.toPortId)),
    selectedId: null,
  }));
}

function moveRackItem(itemId, targetSlot) {
  const rack = state.rack;
  const item = rack.items.find(i => i.id === itemId);
  if (!item) return;

  // Check if target slot is free (ignoring the item being moved)
  const occ = new Set();
  rack.items.forEach(x => {
    if (x.id === itemId) return; // skip self
    for (let u = x.slot; u < x.slot + x.units; u++) occ.add(u);
  });

  // Check all slots the item needs are free
  for (let u = targetSlot; u < targetSlot + item.units; u++) {
    if (u > rack.totalU) return; // out of bounds
    if (occ.has(u)) return;      // collision
  }

  setState(s => ({
    rack: {
      ...s.rack,
      items: s.rack.items.map(i => i.id === itemId ? { ...i, slot: targetSlot } : i)
    }
  }));
}


function updateItem(id, patch) {
  setState(s => ({ rack: { ...s.rack, items: s.rack.items.map(i => i.id === id ? { ...i, ...patch } : i) } }));
}

function handlePortClick(itemId, portId) {
  if (state.tool !== 'cable') return;
  if (!state.selectedPort) { setState({ selectedPort: { itemId, portId } }); return; }
  if (state.selectedPort.portId === portId) { setState({ selectedPort: null }); return; }
  const already = state.cables.some(c =>
    (c.fromPortId === state.selectedPort.portId || c.toPortId === state.selectedPort.portId) &&
    (c.fromPortId === portId || c.toPortId === portId));
  if (!already) {
    setState(s => ({ cables: [...s.cables, { id: genId(), fromPortId: s.selectedPort.portId, toPortId: portId, color: s.cableColor }], selectedPort: null }));
  } else {
    setState({ selectedPort: null });
  }
}

async function analyzePhoto() {
  if (!state.photoImg) return;
  setState({ photoAnalyzing: true });
  try {
    const b = state.photoImg.split(',')[1], mt = state.photoImg.split(';')[0].split(':')[1];
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 600,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: mt, data: b } },
          { type: 'text', text: 'Analyseer dit netwerkapparaat. ALLEEN JSON:\n{"brand":"merk","name":"modelnaam","desc":"beschrijving","ports":24,"portType":"rj45","units":1,"cat":"patch","vendor":"generic","notes":"observaties"}' }
        ]}]})
    });
    const d = await res.json();
    const txt = d.content?.find(c => c.type === 'text')?.text || '';
    setState({ photoResult: JSON.parse(txt.replace(/```json|```/g, '').trim()), photoAnalyzing: false });
  } catch(e) {
    setState({ photoResult: { error: e.message }, photoAnalyzing: false });
  }
}

// ── SVG / HTML renderers for device faces ─────────────────────────────────────
function portBtn(port, item, cables, selectedPort, w, h, radius) {
  const cable = cables.find(c => c.fromPortId === port.id || c.toPortId === port.id);
  const sel = selectedPort?.portId === port.id;
  const col = cable ? cable.color : sel ? '#ffd700' : null;
  const btn = el('button', {
    'data-portid': port.id,
    title: `Poort ${port.number}${cable ? ' · verbonden' : ' · leeg'}`,
    onclick: e => { e.stopPropagation(); handlePortClick(item.id, port.id); },
    style: `width:${w}px;height:${h}px;border:none;padding:0;cursor:pointer;flex-shrink:0;border-radius:${radius}px;` +
      `background:${col || 'linear-gradient(180deg,#1e1e1e,#0d0d0d)'};` +
      `box-shadow:${col ? `0 0 5px ${col},inset 0 0 0 1px ${col}55` : 'inset 0 1px 0 rgba(255,255,255,0.05),inset 0 -1px 0 rgba(0,0,0,0.8)'};` +
      `outline:${sel ? '2px solid #ffd700' : 'none'};outline-offset:1px;position:relative;`,
  });
  if (radius < 3) {
    const line = el('div', { style: `position:absolute;bottom:1px;left:12%;right:12%;height:2px;background:${col || '#1a1a1a'};border-radius:1px` });
    btn.appendChild(line);
  }
  btn.addEventListener('mouseenter', () => btn.style.filter = 'brightness(1.5)');
  btn.addEventListener('mouseleave', () => btn.style.filter = '');
  return btn;
}

function faceUbiquiti(item, cables, selectedPort) {
  const h = item.units * U - 2;
  const sfp = item.sfp || 0;
  const mainPorts = (item.portObjects || []).slice(0, item.ports - sfp);
  const sfpPorts  = (item.portObjects || []).slice(item.ports - sfp);

    `height:${h}px;position:relative;overflow:hidden;` +
    `background:linear-gradient(180deg,#d8d8d8 0%,#c8c8c8 20%,#bebebe 80%,#b0b0b0 100%);` +
    `border-top:1px solid #e0e0e0;border-bottom:1px solid #999;` +
    `box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),inset 0 -1px 0 rgba(0,0,0,0.2)` });

  // Mounting screws (light grey chassis)

  // Inner layout
  const inner = el('div', { style:
    `position:absolute;left:18px;right:18px;top:0;bottom:0;` +
    `display:flex;align-items:center;gap:6px;padding:0 4px;` });

  // ── Ubiquiti logo (left) ──
  const logoBlock = el('div', { style:
    `flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;width:36px;` });
  // Concentric circles logo
  const svgLogo = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svgLogo.setAttribute('width','24'); svgLogo.setAttribute('height','24');
  svgLogo.setAttribute('viewBox','0 0 24 24');
  svgLogo.innerHTML =
    '<circle cx="12" cy="12" r="11" fill="none" stroke="#0059cc" stroke-width="2"/>' +
    '<circle cx="12" cy="12" r="7"  fill="none" stroke="#0059cc" stroke-width="1.8"/>' +
    '<circle cx="12" cy="12" r="3"  fill="#0059cc"/>';
  logoBlock.appendChild(svgLogo);
  logoBlock.appendChild(el('div',{style:`font-size:5px;color:#0059cc;font-weight:700;letter-spacing:0.5px;`},'UniFi'));
  logoBlock.appendChild(el('div',{style:`font-size:3.8px;color:#666;white-space:nowrap;overflow:hidden;max-width:36px;text-align:center;`}, item.name||''));
  inner.appendChild(logoBlock);

  // ── 2-row port grid (odd top, even bottom — exactly like real device) ──
  // Split into columns of 2
  const cols = Math.ceil(mainPorts.length / 2);
  const portW = Math.min(18, Math.floor((h * 5.5) / 2 / cols));  // auto-fit
  const portH = portW + 2;
  const colGap = Math.max(1, Math.min(3, Math.floor((h * 5 - cols * portW) / cols)));

  const portsWrap = el('div', {style:`flex:1;display:flex;gap:${colGap}px;align-items:center;justify-content:flex-start;`});

  // Build columns: each column = top port (odd) + bottom port (even)
  for (let col = 0; col < cols; col++) {
    const topPort = mainPorts[col * 2];       // odd  (1,3,5...)
    const botPort = mainPorts[col * 2 + 1];   // even (2,4,6...)

    const colDiv = el('div', {style:`display:flex;flex-direction:column;gap:2px;align-items:center;`});

    // LED above each column
    const ledRow = el('div', {style:`display:flex;gap:2px;`});
    [topPort, botPort].forEach(p => {
      if (!p) return;
      const c = cables.find(x => x.fromPortId===p.id || x.toPortId===p.id);
      ledRow.appendChild(el('div',{style:
        `width:${portW-1}px;height:3px;border-radius:1px;flex-shrink:0;` +
        `background:${c ? c.color : '#22c55e'};opacity:${c ? 1 : 0.8};` +
        `box-shadow:${c ? `0 0 4px ${c.color}` : '0 0 3px rgba(34,197,94,0.5)'};`}));
    });
    colDiv.appendChild(ledRow);

    // Top port
    if (topPort) {
      const btn = portBtn(topPort, item, cables, selectedPort, portW, portH, 2);
      // Light chassis port style
      btn.style.background = 'linear-gradient(180deg,#222 0%,#111 60%,#0d0d0d 100%)';
      btn.style.border = '1px solid #555';
      btn.style.borderRadius = '2px';
      btn.style.boxShadow = 'inset 0 2px 3px rgba(0,0,0,0.8),inset 0 -1px 0 rgba(255,255,255,0.04)';
      // RJ45 tab detail
      const tab = el('div',{style:`position:absolute;bottom:2px;left:20%;right:20%;height:2px;background:#1a1a1a;border-radius:1px;`});
      btn.style.position = 'relative';
      btn.appendChild(tab);
      colDiv.appendChild(btn);
    }
    // Bottom port
    if (botPort) {
      const btn = portBtn(botPort, item, cables, selectedPort, portW, portH, 2);
      btn.style.background = 'linear-gradient(180deg,#222 0%,#111 60%,#0d0d0d 100%)';
      btn.style.border = '1px solid #555';
      btn.style.borderRadius = '2px';
      btn.style.boxShadow = 'inset 0 2px 3px rgba(0,0,0,0.8),inset 0 -1px 0 rgba(255,255,255,0.04)';
      const tab = el('div',{style:`position:absolute;bottom:2px;left:20%;right:20%;height:2px;background:#1a1a1a;border-radius:1px;`});
      btn.style.position = 'relative';
      btn.appendChild(tab);
      colDiv.appendChild(btn);
    }

    portsWrap.appendChild(colDiv);
  }
  inner.appendChild(portsWrap);

  // ── SFP+ ports (stacked 2x) ──
  if (sfpPorts.length > 0) {
    const sfpBlock = el('div', {style:`flex-shrink:0;display:flex;flex-direction:column;gap:3px;`});
    sfpPorts.forEach(p => {
      const c = cables.find(x => x.fromPortId===p.id || x.toPortId===p.id);
      const col2 = c ? c.color : selectedPort?.portId===p.id ? '#ffd700' : null;
      const sfpBtn = el('button', {
        'data-portid': p.id,
        style:
          `width:22px;height:${Math.floor(h/2)-4}px;border-radius:3px;padding:0;cursor:pointer;` +

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(tag, attrs = {}, text) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  });
  if (text !== undefined) e.textContent = text;
  return e;
}

function div(style, children = []) {
  const d = el('div', { style });
  children.forEach(c => c && d.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return d;
}

}

// Base URLs to try (in order)
function getImageUrl(filename) {
  // raw.githubusercontent.com works immediately, no Pages needed
  return `https://raw.githubusercontent.com/${GITHUB_IMAGE_REPO.owner}/${GITHUB_IMAGE_REPO.repo}/${GITHUB_IMAGE_REPO.branch}/${GITHUB_IMAGE_REPO.folder}/${filename}`;
}

// Cache: filename (without ext) -> base64 data URL
const deviceImageCache = {};
let githubImagesLoaded = false;
let githubLoadPromise = null;

// Map device model names to likely filenames
function modelToFilename(item) {
  // Try exact model name first, then variations
  const candidates = [
    item.id,
    item.name,
    item.name?.replace(/[^a-zA-Z0-9-]/g, '-'),
    item.name?.toUpperCase(),
    item.name?.toUpperCase().replace(/[^A-Z0-9-]/g, '-'),
  ].filter(Boolean);
  return candidates;
}

async function loadGithubImages() {
  if (githubImagesLoaded) return;
  if (githubLoadPromise) return githubLoadPromise;

  githubLoadPromise = (async () => {
    try {
      // List files in the images/ folder via GitHub API
      const apiUrl = `https://api.github.com/repos/${GITHUB_IMAGE_REPO.owner}/${GITHUB_IMAGE_REPO.repo}/contents/${GITHUB_IMAGE_REPO.folder}?ref=${GITHUB_IMAGE_REPO.branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const files = await res.json();

      const imageFiles = files.filter(f =>
        f.type === 'file' && /\.(png|jpg|jpeg|webp|svg)$/i.test(f.name)
      );

      console.log(`Found ${imageFiles.length} images in GitHub repo`);

      // Store direct URLs (no need to download — browser can load them directly)
      imageFiles.forEach(file => {
        const key = file.name.replace(/\.[^.]+$/, '').toLowerCase().replace(/[^a-z0-9-]/g, '-');
        const rawUrl = getImageUrl(file.name);
        deviceImageCache[key] = rawUrl;
        // Also store original filename without extension
        const origKey = file.name.replace(/\.[^.]+$/, '').toLowerCase();
        deviceImageCache[origKey] = rawUrl;
      });

      githubImagesLoaded = true;
      console.log(`✓ Mapped ${Object.keys(deviceImageCache).length} device images from GitHub`);
      render();
    } catch(e) {
      console.warn('GitHub image load failed:', e.message);
      githubImagesLoaded = true; // don't retry
    }
  })();
  return githubLoadPromise;
}

function getDeviceImage(item) {
  // Trigger load if not started
  if (!githubImagesLoaded) { loadGithubImages(); return null; }

  // Build candidate keys from item properties
  const raw = [
    item.name, item.id, item.modelName,
    item.brandName ? `${item.brandName}-${item.name}` : null,
  ].filter(Boolean);

  const candidates = raw.map(s =>
    s.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g,'')
  );

  // 1. Exact match
  for (const c of candidates) {
    if (deviceImageCache[c]) return deviceImageCache[c];
  }

  // 2. Fuzzy: any cached key that contains or is contained by a candidate
  const cacheKeys = Object.keys(deviceImageCache);
  for (const c of candidates) {
    if (c.length < 3) continue;
    const match = cacheKeys.find(k => k.includes(c) || c.includes(k));
    if (match) return deviceImageCache[match];
  }

  return null;
}

// Start loading when page loads
document.addEventListener('DOMContentLoaded', () => {
  if (GITHUB_IMAGE_REPO.owner) loadGithubImages();
});

function buildThumb(item) {

  } else if (item.cat === 'ups') {
    svg = STENCIL.ups_2u;

  } else if (item.vendor === 'cisco' && item.cat === 'router') {
    svg = STENCIL.cisco_router;
  } else if (item.vendor === 'cisco') {
    svg = STENCIL.cisco_sw;
  } else if (item.vendor === 'ubiquiti') {
    svg = STENCIL.ubiquiti_sw;
  } else if (item.vendor === 'tplink') {
    svg = STENCIL.tplink_sw;
  } else if (item.vendor === 'hp') {
    svg = STENCIL.hp_sw;
  } else if (item.cat === 'switch' || item.cat === 'router') {

  } else if (item.cat === 'cable') {
    svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 28" width="100%" height="100%"><rect width="160" height="28" fill="#0d0d0d"/><text x="12" y="12" font-size="5" fill="#333" font-family="sans-serif" font-weight="700">CABLE</text><text x="12" y="20" font-size="5" fill="#333" font-family="sans-serif" font-weight="700">MGMT</text>${[0,1,2,3,4,5,6].map(i=>`<circle cx="${46+i*16}" cy="14" r="8" fill="none" stroke="#1e1e1e" stroke-width="2.5"/><circle cx="${46+i*16}" cy="14" r="4" fill="none" stroke="#181818" stroke-width="1.5"/>`).join('')}</svg>`;
  } else if (item.cat === 'filler') {

// ── Auto Device Image System ──────────────────────────────────────────────────
const imageCache = {};     // itemId -> { url, loading, error }
const pendingFetches = {}; // itemId -> true (prevent duplicate fetches)

async function fetchDeviceImage(item) {
  const key = item.id;
  if (imageCache[key] || pendingFetches[key]) return;
  pendingFetches[key] = true;
  imageCache[key] = { loading: true };
  // Show spinner immediately
  const thumbEl = document.querySelector(`[data-thumbid="${key}"]`);
  if (thumbEl) thumbEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#484f58;font-size:9px">⏳</div>';

  try {
    const brand = item.brandName || item.brand || item.vendor || '';
    const model = item.name || item.id;
    const query = `${brand} ${model} front panel product image`.trim();

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Search for the official product image of: "${brand} ${model}" network device.
I need a direct URL to a PNG/JPG/WEBP image file showing the front panel of this device.
Look on the official vendor website, product pages, or press images.
Return ONLY this JSON (no other text):
{"url":"DIRECT_IMAGE_URL_HERE"}
The URL must end in .png, .jpg, .jpeg, or .webp and must be a real direct image link.`
        }]
      })
    });

    const data = await res.json();

    // Walk through all content blocks to find a URL
    let foundUrl = null;
    for (const block of (data.content || [])) {
      if (block.type === 'text') {
        // Try JSON parse
        try {
          const clean = block.text.replace(/```json|```/g,'').trim();
          const parsed = JSON.parse(clean);
          if (parsed.url) { foundUrl = parsed.url; break; }
        } catch(e) {}
        // Try regex for any direct image URL
        const matches = block.text.match(/https?:\/\/[^\s"'<>]+\.(png|jpg|jpeg|webp)/gi);
        if (matches && matches.length > 0) { foundUrl = matches[0]; break; }
      }
    }

    if (foundUrl) {
      imageCache[key] = { url: foundUrl, loading: false };
      delete pendingFetches[key];
      render();
      return;
    }

    imageCache[key] = { error: true, loading: false };
  } catch(e) {
    console.warn('Image fetch failed for', item.name, e);
    imageCache[key] = { error: true, loading: false };
  }
  delete pendingFetches[key];
  render();
}

function getItemImage(item) {
  const cached = imageCache[item.id];
  if (!cached) return null;
  if (cached.loading) return 'loading';
  if (cached.url) return cached.url;
  return null;
}

// Render device face using real photo if available
function renderDeviceFaceWithImage(item, cables, selectedPort, onPortClick) {
  const imgUrl = getItemImage(item);

  if (imgUrl && imgUrl !== 'loading') {
    const h = item.units * U - 2;
    const wrap = document.createElement('div');
    wrap.style.cssText = `height:${h}px;position:relative;overflow:hidden;background:#111;`;

    // The actual photo — fitted to height, cropped width
    const img = document.createElement('img');
    img.src = imgUrl;
    img.style.cssText = 'height:100%;width:100%;object-fit:cover;object-position:left center;display:block;';
    img.onerror = () => {
      // Image failed to load — fall back to SVG
      imageCache[item.id] = { error: true };
      render();
    };
    wrap.appendChild(img);

    // Dark overlay with port buttons on top so cables still work
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0) 60%,rgba(0,0,0,0.4) 100%);pointer-events:none;';
    wrap.appendChild(overlay);

    // Port hit areas (invisible buttons over the image for cable connections)
    if (item.portObjects && item.portObjects.length > 0) {
      const portLayer = document.createElement('div');
      portLayer.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;pointer-events:none;';

      // Estimate port area: starts ~15% from left, ends ~85% from left
      const portArea = document.createElement('div');
      portArea.style.cssText = 'position:absolute;left:15%;right:20%;top:10%;bottom:10%;display:flex;flex-wrap:wrap;gap:2px;align-content:center;pointer-events:all;opacity:0;';
      portArea.style.transition = 'opacity 0.2s';

      item.portObjects.forEach(port => {
        const cable = cables.find(c => c.fromPortId === port.id || c.toPortId === port.id);
        const sel = selectedPort?.portId === port.id;
        const btn = document.createElement('button');
        btn.setAttribute('data-portid', port.id);
        btn.title = `Poort ${port.number}${cable ? ' · verbonden' : ''}`;
        const col = cable ? cable.color : sel ? '#ffd700' : 'rgba(255,255,255,0.3)';
        btn.style.cssText = `width:14px;height:14px;border:2px solid ${col};border-radius:2px;background:${cable ? col + '88' : 'transparent'};cursor:pointer;padding:0;flex-shrink:0;box-shadow:${cable ? `0 0 6px ${col}` : 'none'};`;
        btn.addEventListener('click', e => { e.stopPropagation(); handlePortClick(item.id, port.id); });
        portArea.appendChild(btn);
      });

      portLayer.appendChild(portArea);
      wrap.appendChild(portLayer);

      // Show port overlay on hover
      wrap.addEventListener('mouseenter', () => portArea.style.opacity = '1');
      wrap.addEventListener('mouseleave', () => portArea.style.opacity = '0');
    }

    return wrap;
  }

  // No image yet — trigger fetch and show SVG in the meantime
  if (!imageCache[item.id] && !pendingFetches[item.id]) {
    fetchDeviceImage(item);
  }

  return renderDeviceFace(item, cables, selectedPort, onPortClick);
}

  // ── Slot highlight element (controlled by DragMgr) ──────────────────────

  });

  slotHL.appendChild(hlLabel);
  bay.appendChild(slotHL);

  // Click on empty bay area to deselect
  bay.addEventListener('click', e => {
    if (!e.target.closest('button')) setState({ selectedId: null });
  });

  // ── Cable SVG overlay — drawn on top of rack bay ─────────────────────────
  const cableSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  cableSvg.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15;overflow:visible';
  cableSvg.id = 'cable-svg';

  // Draw cables after DOM is painted so port positions are known
  requestAnimationFrame(() => {
    const svgEl = document.getElementById('cable-svg');
    const bayEl = document.getElementById('rack-bay');
    if (!svgEl || !bayEl) return;
    svgEl.innerHTML = '';
    const bayRect = bayEl.getBoundingClientRect();

    cables.forEach(cable => {
      const fromEl = bayEl.querySelector(`[data-portid="${cable.fromPortId}"]`);
      const toEl   = bayEl.querySelector(`[data-portid="${cable.toPortId}"]`);
      if (!fromEl || !toEl) return;

      const fr = fromEl.getBoundingClientRect();
      const tr = toEl.getBoundingClientRect();

      // Center of each port relative to bay
      const x1 = fr.left + fr.width/2  - bayRect.left;
      const y1 = fr.top  + fr.height/2 - bayRect.top;
      const x2 = tr.left + tr.width/2  - bayRect.left;
      const y2 = tr.top  + tr.height/2 - bayRect.top;

      // Bezier curve — exits right side of rack, curves around
      const midX = Math.max(x1, x2) + 40 + Math.abs(y2 - y1) * 0.15;
      const cp1x = midX, cp1y = y1;
      const cp2x = midX, cp2y = y2;

      // Shadow path (darker, slightly thicker)
      const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      shadow.setAttribute('d', `M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`);
      shadow.setAttribute('fill', 'none');
      shadow.setAttribute('stroke', 'rgba(0,0,0,0.5)');
      shadow.setAttribute('stroke-width', '5');
      shadow.setAttribute('stroke-linecap', 'round');
      svgEl.appendChild(shadow);

      // Main cable path
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${x1},${y1} C${cp1x},${cp1y} ${cp2x},${cp2y} ${x2},${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', cable.color);
      path.setAttribute('stroke-width', '3');
      path.setAttribute('stroke-linecap', 'round');
      svgEl.appendChild(path);

      // Dot at each end
      [x1,y1,x2,y2].forEach((_,i,a) => {
        if (i % 2 !== 0) return;
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', a[i]);
        dot.setAttribute('cy', a[i+1]);
        dot.setAttribute('r', '3.5');
        dot.setAttribute('fill', cable.color);
        dot.setAttribute('stroke', '#0d1117');
        dot.setAttribute('stroke-width', '1.5');
        svgEl.appendChild(dot);
      });
    });
  });

  bay.appendChild(cableSvg);

    inner.appendChild(bay);
  inner.appendChild(buildRail('right'));
  wrap.appendChild(inner);
  return wrap;
}

function buildPhotoModal(img, analyzing, result) {

  if (!img) {
    const dropZone = el('div', { style: 'border:2px dashed #30363d;border-radius:10px;padding:48px;text-align:center;cursor:pointer;transition:all 0.15s' });
    dropZone.addEventListener('mouseenter', () => { dropZone.style.borderColor = '#2f81f7'; dropZone.style.background = '#0d1f35'; });
    dropZone.addEventListener('mouseleave', () => { dropZone.style.borderColor = '#30363d'; dropZone.style.background = 'transparent'; });
    dropZone.addEventListener('click', () => {
      const fi = document.createElement('input');
      fi.type = 'file'; fi.accept = 'image/*';
      fi.addEventListener('change', e => {
        const f = e.target.files[0]; if (!f) return;
        const r = new FileReader();
        r.onload = ev => setState({ photoImg: ev.target.result, photoResult: null });
        r.readAsDataURL(f);
      });
      fi.click();
    });
    dropZone.appendChild(el('div', { style: 'font-size:36px;margin-bottom:10px' }, '📷'));
    dropZone.appendChild(el('div', { style: 'font-size:14px;font-weight:600;color:#8b949e' }, 'Klik om foto te uploaden'));
    dropZone.appendChild(el('div', { style: 'font-size:11px;color:#484f58;margin-top:4px' }, 'JPG, PNG of WEBP'));
    body.appendChild(dropZone);
  } else {
    const imgWrap = el('div', { style: 'position:relative;margin-bottom:14px' });
    imgWrap.appendChild(el('img', { src: img, style: 'width:100%;max-height:200px;object-fit:contain;border-radius:8px;border:1px solid #30363d;background:#0d1117' }));
    imgWrap.appendChild(el('button', { style: 'position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:5px;background:rgba(0,0,0,0.8);border:1px solid #30363d;color:#8b949e;cursor:pointer;font-size:13px', onclick: () => setState({ photoImg: null, photoResult: null }) }, '×'));
    body.appendChild(imgWrap);
    if (!result) {
      body.appendChild(el('button', { style: `width:100%;padding:11px;background:${analyzing?'#21262d':'#2f81f7'};border:none;border-radius:8px;color:${analyzing?'#484f58':'#fff'};font-size:13px;font-weight:600;cursor:${analyzing?'default':'pointer'}`, onclick: analyzePhoto }, analyzing ? '⏳ Analyseren...' : '⚡ Analyseer met AI'));
    }

  if (result && !result.error) {
    const res = el('div', { style: 'margin-top:14px;background:#0d2218;border:1px solid #1a4731;border-radius:10px;overflow:hidden' });

    const statusEl = modal.querySelector('#gh-status');
    const countEl = modal.querySelector('#gh-count');
    if (statusEl) statusEl.style.display = 'block';
    if (countEl) countEl.textContent = Object.keys(deviceImageCache).length;
  }
  return overlay;
}
